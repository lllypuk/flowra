{{define "message_form"}}
<form
    class="message-form"
    hx-post="/api/v1/workspaces/{{.Data.Chat.WorkspaceID}}/chats/{{.Data.Chat.ID}}/messages"
    hx-swap="none"
    hx-on::after-request="handleMessageSent(event, '{{.Data.Chat.ID}}')"
>
    <div class="message-input-wrapper">
        <!-- Attachment preview area -->
        <div id="attachment-preview-{{.Data.Chat.ID}}" class="attachment-preview hidden"></div>

        <textarea
            name="content"
            id="message-input-{{.Data.Chat.ID}}"
            placeholder="Type a message... Use # for tags, @ for mentions"
            rows="1"
            required
            oninput="autoResize(this); handleTyping('{{.Data.Chat.ID}}')"
            onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); this.form.requestSubmit(); }"
            onpaste="handlePaste(event, '{{.Data.Chat.ID}}')"
        ></textarea>

        <!-- Tag autocomplete dropdown -->
        <div
            id="tag-autocomplete-{{.Data.Chat.ID}}"
            class="autocomplete-dropdown hidden"
        >
            <ul>
                <!-- Entity Creation Tags -->
                <li data-tag="#task" tabindex="0">
                    <span class="autocomplete-icon">T</span>
                    <span class="autocomplete-label">Create Task</span>
                </li>
                <li data-tag="#bug" tabindex="0">
                    <span class="autocomplete-icon bug">B</span>
                    <span class="autocomplete-label">Create Bug</span>
                </li>
                <li data-tag="#epic" tabindex="0">
                    <span class="autocomplete-icon epic">E</span>
                    <span class="autocomplete-label">Create Epic</span>
                </li>
                <!-- Entity Management Tags -->
                <li data-tag="#status" tabindex="0">
                    <span class="autocomplete-icon status">S</span>
                    <span class="autocomplete-label">Set Status</span>
                </li>
                <li data-tag="#assignee" tabindex="0">
                    <span class="autocomplete-icon assign">@</span>
                    <span class="autocomplete-label">Assign to User</span>
                </li>
                <li data-tag="#priority" tabindex="0">
                    <span class="autocomplete-icon priority">!</span>
                    <span class="autocomplete-label">Set Priority</span>
                </li>
                <li data-tag="#due" tabindex="0">
                    <span class="autocomplete-icon due">D</span>
                    <span class="autocomplete-label">Set Due Date</span>
                </li>
                <li data-tag="#title" tabindex="0">
                    <span class="autocomplete-icon title">A</span>
                    <span class="autocomplete-label">Change Title</span>
                </li>
                <li data-tag="#severity" tabindex="0">
                    <span class="autocomplete-icon severity">!</span>
                    <span class="autocomplete-label">Set Severity</span>
                </li>
                <!-- Participant Management Tags -->
                <li data-tag="#invite" tabindex="0">
                    <span class="autocomplete-icon assign">+</span>
                    <span class="autocomplete-label">Invite User</span>
                </li>
                <li data-tag="#remove" tabindex="0">
                    <span class="autocomplete-icon severity">-</span>
                    <span class="autocomplete-label">Remove User</span>
                </li>
                <!-- Chat Lifecycle Tags -->
                <li data-tag="#close" tabindex="0">
                    <span class="autocomplete-icon status">X</span>
                    <span class="autocomplete-label">Close Chat</span>
                </li>
                <li data-tag="#reopen" tabindex="0">
                    <span class="autocomplete-icon status">R</span>
                    <span class="autocomplete-label">Reopen Chat</span>
                </li>
            </ul>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file"
           id="file-input-{{.Data.Chat.ID}}"
           class="file-input-hidden"
           multiple
           accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip,.tar.gz"
           onchange="handleFileSelect(this, '{{.Data.Chat.ID}}')" />

    <button type="button"
            class="attach-btn"
            title="Attach file"
            onclick="document.getElementById('file-input-{{.Data.Chat.ID}}').click()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
        </svg>
    </button>

    <button type="submit" title="Send message (Enter)">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        <span class="sr-only">Send</span>
    </button>
</form>

<script>
    function handleMessageSent(event, chatId) {
        if (event.detail.successful) {
            // Reset form
            event.target.reset();
            autoResize(event.target.querySelector("textarea"));

            // Get message ID from response
            try {
                const response = JSON.parse(event.detail.xhr.responseText);
                if (response.data && response.data.id) {
                    const messageId = response.data.id;

                    // Upload pending files — the attachment flow will re-render the
                    // message via outerHTML swap once all files are attached.
                    uploadPendingFiles(chatId, messageId);
                    clearAttachmentPreview(chatId);

                    // Do NOT fetch the message HTML here. The WebSocket event
                    // chat.message.posted will deliver it to all clients (including
                    // the sender), so we avoid a duplicate insertion.
                }
            } catch (e) {
                console.error("Failed to parse message response:", e);
                // Fallback: reload all messages
                htmx.ajax("GET", "/partials/chats/" + chatId + "/messages", {
                    target: "#messages-" + chatId,
                    swap: "innerHTML",
                }).then(function () {
                    scrollToBottom("messages-" + chatId);
                });
            }
        }
    }

    // Pending files per chat
    window.__pendingFiles = window.__pendingFiles || {};

    function handleFileSelect(input, chatId) {
        if (!input.files || input.files.length === 0) return;
        if (!window.__pendingFiles[chatId]) window.__pendingFiles[chatId] = [];

        for (var i = 0; i < input.files.length; i++) {
            var file = input.files[i];
            if (file.size > 10 * 1024 * 1024) {
                showToast('File "' + file.name + '" exceeds 10 MB limit', 'error');
                continue;
            }
            window.__pendingFiles[chatId].push(file);
        }
        input.value = '';
        renderAttachmentPreview(chatId);

        // Remove required from textarea if files are pending
        var textarea = document.getElementById('message-input-' + chatId);
        if (textarea && window.__pendingFiles[chatId].length > 0) {
            textarea.removeAttribute('required');
        }
    }

    function handlePaste(event, chatId) {
        var items = (event.clipboardData || event.originalEvent.clipboardData).items;
        for (var i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                event.preventDefault();
                var file = items[i].getAsFile();
                if (!window.__pendingFiles[chatId]) window.__pendingFiles[chatId] = [];
                // Name pasted images with timestamp
                var ext = file.type.split('/')[1] || 'png';
                var named = new File([file], 'pasted-image-' + Date.now() + '.' + ext, { type: file.type });
                window.__pendingFiles[chatId].push(named);
                renderAttachmentPreview(chatId);
                break;
            }
        }
    }

    function renderAttachmentPreview(chatId) {
        var container = document.getElementById('attachment-preview-' + chatId);
        if (!container) return;

        var files = window.__pendingFiles[chatId] || [];
        if (files.length === 0) {
            container.classList.add('hidden');
            container.innerHTML = '';
            return;
        }
        container.classList.remove('hidden');
        container.innerHTML = '';

        files.forEach(function(file, idx) {
            var item = document.createElement('div');
            item.className = 'attachment-preview-item';

            if (file.type.startsWith('image/')) {
                var img = document.createElement('img');
                img.className = 'attachment-thumb';
                var reader = new FileReader();
                reader.onload = function(e) { img.src = e.target.result; };
                reader.readAsDataURL(file);
                item.appendChild(img);
            } else {
                var icon = document.createElement('span');
                icon.className = 'attachment-file-icon';
                icon.textContent = '📄';
                item.appendChild(icon);
            }

            var name = document.createElement('span');
            name.className = 'attachment-name';
            name.textContent = file.name;
            name.title = file.name + ' (' + formatSize(file.size) + ')';
            item.appendChild(name);

            var removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'attachment-remove';
            removeBtn.innerHTML = '&times;';
            removeBtn.onclick = function() {
                window.__pendingFiles[chatId].splice(idx, 1);
                renderAttachmentPreview(chatId);
                // Restore required on textarea if no files
                if (window.__pendingFiles[chatId].length === 0) {
                    var ta = document.getElementById('message-input-' + chatId);
                    if (ta) ta.setAttribute('required', '');
                }
            };
            item.appendChild(removeBtn);

            container.appendChild(item);
        });
    }

    function clearAttachmentPreview(chatId) {
        window.__pendingFiles[chatId] = [];
        var container = document.getElementById('attachment-preview-' + chatId);
        if (container) {
            container.classList.add('hidden');
            container.innerHTML = '';
        }
        // Restore required on textarea
        var ta = document.getElementById('message-input-' + chatId);
        if (ta) ta.setAttribute('required', '');
    }

    function uploadPendingFiles(chatId, messageId) {
        var files = window.__pendingFiles[chatId] || [];
        if (files.length === 0) return;

        var remaining = files.length;

        files.forEach(function(file) {
            var formData = new FormData();
            formData.append('file', file);
            formData.append('chat_id', chatId);

            fetch('/api/v1/files/upload', {
                method: 'POST',
                body: formData
            }).then(function(resp) {
                if (!resp.ok) throw new Error('Upload failed');
                return resp.json();
            }).then(function(result) {
                if (result.data && result.data.file_id) {
                    return fetch('/api/v1/messages/' + messageId + '/attachments', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            file_id: result.data.file_id,
                            file_name: result.data.file_name,
                            file_size: result.data.file_size,
                            mime_type: result.data.mime_type
                        })
                    });
                }
            }).then(function() {
                remaining--;
                if (remaining <= 0) {
                    htmx.ajax('GET', '/partials/messages/' + messageId, {
                        target: '#message-' + messageId,
                        swap: 'outerHTML'
                    });
                }
            }).catch(function(err) {
                remaining--;
                console.error('File upload error:', err);
                showToast('Failed to upload ' + file.name, 'error');
            });
        });

        window.__pendingFiles[chatId] = [];
    }

    function formatSize(bytes) {
        if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
        if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return bytes + ' B';
    }
</script>

<style>
    .message-form {
        display: flex;
        gap: 0.5rem;
        padding: 1rem;
        border-top: 1px solid var(--muted-border-color);
        background: var(--background-color);
        align-items: flex-end;
        flex-shrink: 0; /* Prevent form from shrinking */
        overflow: visible;
    }

    .message-input-wrapper {
        flex: 1;
        position: relative;
        overflow: visible;
    }

    .message-form textarea {
        width: 100%;
        resize: none;
        min-height: 2.5rem;
        max-height: 10rem;
        margin-bottom: 0;
        padding: 0.5rem 0.75rem;
        line-height: 1.5;
        overflow-y: hidden;
        overflow-x: hidden;
    }

    .message-form button[type="submit"] {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.5rem;
        height: 2.5rem;
        padding: 0;
        margin-bottom: 0;
        border-radius: 50%;
    }

    .message-form button[type="submit"] svg {
        margin: 0;
    }

    .file-input-hidden {
        display: none;
    }

    .attach-btn {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.5rem;
        height: 2.5rem;
        padding: 0;
        margin-bottom: 0;
        border-radius: 50%;
        background: transparent;
        border: 1px solid var(--muted-border-color);
        color: var(--muted-color);
        cursor: pointer;
        transition: all 0.15s ease;
    }

    .attach-btn:hover {
        color: var(--primary);
        border-color: var(--primary);
        background: var(--primary-focus);
    }

    .attachment-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 0.5rem;
        margin-bottom: 0.25rem;
        background: var(--secondary-focus);
        border-radius: 6px;
        border: 1px solid var(--muted-border-color);
    }

    .attachment-preview-item {
        display: flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.25rem 0.5rem;
        background: var(--background-color);
        border-radius: 4px;
        border: 1px solid var(--muted-border-color);
        font-size: 0.8125rem;
        max-width: 200px;
    }

    .attachment-thumb {
        width: 32px;
        height: 32px;
        object-fit: cover;
        border-radius: 3px;
    }

    .attachment-file-icon {
        font-size: 1.25rem;
        flex-shrink: 0;
    }

    .attachment-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        min-width: 0;
    }

    .attachment-remove {
        flex-shrink: 0;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        color: var(--muted-color);
        padding: 0;
        width: auto;
        margin: 0;
        line-height: 1;
    }

    .attachment-remove:hover {
        color: var(--flowra-danger, #ef4444);
    }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    .autocomplete-dropdown {
        position: fixed;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid var(--muted-border-color);
        border-radius: 8px;
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        max-height: 180px;
        overflow-y: auto;
        z-index: 9999;
        min-width: 300px;
        backdrop-filter: blur(10px);
    }

    .autocomplete-dropdown ul {
        list-style: none;
        margin: 0;
        padding: 0.25rem;
    }

    .autocomplete-dropdown li {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.75rem;
        cursor: pointer;
        border-radius: 6px;
        transition: background-color 0.15s ease;
        color: #1a1a1a;
    }

    .autocomplete-dropdown li:hover,
    .autocomplete-dropdown li.active {
        background: var(--primary-focus);
    }

    .autocomplete-dropdown li:focus {
        outline: none;
        background: var(--primary-focus);
    }

    .autocomplete-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 600;
        background: #3b82f6;
        color: white;
        flex-shrink: 0;
    }

    .autocomplete-icon.bug {
        background: #ef4444;
    }

    .autocomplete-icon.status {
        background: #10b981;
    }

    .autocomplete-icon.assign {
        background: #f59e0b;
    }

    .autocomplete-icon.priority {
        background: #ec4899;
    }

    .autocomplete-icon.due {
        background: #8b5cf6;
    }

    .autocomplete-icon.epic {
        background: #7b1fa2;
    }

    .autocomplete-icon.title {
        background: #00838f;
    }

    .autocomplete-icon.severity {
        background: #b71c1c;
    }

    .autocomplete-label {
        font-size: 0.8125rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #1a1a1a;
    }

    .hidden {
        display: none !important;
    }

    @media (prefers-color-scheme: dark) {
        .autocomplete-dropdown {
            background: rgba(30, 30, 30, 0.98);
        }

        .autocomplete-dropdown li,
        .autocomplete-dropdown .autocomplete-label {
            color: #f3f4f6 !important;
        }
    }
</style>
{{end}}
