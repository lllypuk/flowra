{{define "chat/view"}}
<div class="chat-view" id="chat-{{.Data.Chat.ID}}">
    <!-- Chat Header -->
    <header class="chat-header">
        <div class="chat-title">
            <h2>{{.Data.Chat.Title}}</h2>
            {{if .Data.Chat.IsTaskChat}}
            {{with .Data.Task}}
            {{$status := .Status}}
            <span class="status-badge {{if eq $status "To Do"}}status-todo{{else if eq $status "In Progress"}}status-in_progress{{else if eq $status "In Review"}}status-review{{else if eq $status "Done"}}status-done{{else if eq $status "Backlog"}}status-backlog{{else if eq $status "Cancelled"}}status-cancelled{{else}}status-{{$status | lower}}{{end}}" id="chat-header-status">
                {{$status}}
            </span>
            {{else}}
            <span class="status-badge status-{{$.Data.Chat.Status | lower}}" id="chat-header-status">
                {{$.Data.Chat.Status}}
            </span>
            {{end}}
            {{end}}
        </div>

        <div class="chat-actions">
            <button
                hx-get="/partials/chats/{{.Data.Chat.ID}}/participants"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="outline small"
                title="Participants"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                {{.Data.Chat.ParticipantCount}}
            </button>
        </div>
    </header>

    <!-- Messages Container -->
    <div
        class="messages-container"
        id="messages-{{.Data.Chat.ID}}"
        hx-get="/partials/chats/{{.Data.Chat.ID}}/messages"
        hx-trigger="load"
        hx-swap="innerHTML"
    >
        {{template "loading" (dict "ID" "messages-loading")}}
    </div>

    <!-- Typing Indicator -->
    <div
        id="typing-indicator-{{.Data.Chat.ID}}"
        class="typing-indicator hidden"
    >
        <span class="typing-dots">
            <span></span><span></span><span></span>
        </span>
        <span id="typing-users"></span> is typing...
    </div>

    <!-- Message Input -->
    {{template "message_form" .}}
</div>

<script>
    // Subscribe to chat via WebSocket on load
    (function () {
        var chatId = '{{.Data.Chat.ID}}';
        var chatViewInitRegistry =
            window.__flowraChatViewInit || (window.__flowraChatViewInit = {});
        var chatViewInitState = chatViewInitRegistry[chatId] || {};

        // Cancel pending init work from a previous render of the same chat partial.
        if (chatViewInitState.subscribeTimer) {
            clearTimeout(chatViewInitState.subscribeTimer);
        }
        if (
            chatViewInitState.presenceAbortController &&
            typeof chatViewInitState.presenceAbortController.abort === "function"
        ) {
            chatViewInitState.presenceAbortController.abort();
        }

        chatViewInitState.subscribeTimer = null;
        chatViewInitState.presenceAbortController =
            typeof AbortController !== "undefined" ? new AbortController() : null;
        chatViewInitRegistry[chatId] = chatViewInitState;

        // Find WebSocket connection
        var wsElements = document.querySelectorAll('[hx-ext*="ws"]');
        if (wsElements.length > 0) {
            // Wait a bit for WebSocket to connect
            chatViewInitState.subscribeTimer = setTimeout(function () {
                chatViewInitState.subscribeTimer = null;
                for (var i = 0; i < wsElements.length; i++) {
                    // HTMX v2 stores ws in htmx-internal-data.webSocket.socket
                    var internalData = wsElements[i]['htmx-internal-data'];
                    var wsWrapper = internalData && internalData.webSocket;
                    var socket = wsWrapper && wsWrapper.socket;
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        if (chatViewInitState.lastSubscribedSocket === socket) {
                            break;
                        }
                        socket.send(
                            JSON.stringify({
                                type: "subscribe",
                                chat_id: chatId,
                            }),
                        );
                        chatViewInitState.lastSubscribedSocket = socket;
                        console.log("Subscribed to chat:", chatId);
                        break;
                    }
                }
            }, 500);

            // Load initial presence data
            var presenceFetchOptions = {};
            if (chatViewInitState.presenceAbortController) {
                presenceFetchOptions.signal = chatViewInitState.presenceAbortController.signal;
            }

            fetch(
                '/api/v1/workspaces/{{.Data.Chat.WorkspaceID}}/chats/' + chatId + '/presence',
                presenceFetchOptions,
            )
                .then(function(response) {
                    if (!response.ok) return;
                    return response.json();
                })
                .then(function(presenceData) {
                    if (!presenceData) return;
                    
                    var onlineCount = 0;
                    presenceData.forEach(function(p) {
                        if (p.is_online) onlineCount++;
                    });
                    
                    // Update header online count
                    var countEl = document.getElementById('chat-online-count');
                    if (countEl) {
                        if (onlineCount > 0) {
                            countEl.textContent = onlineCount + ' online';
                        } else {
                            countEl.textContent = '';
                        }
                    }
                })
                .catch(function(err) {
                    if (err && err.name === "AbortError") return;
                });
        }
    })();

    // Register global listeners once per chat to avoid duplicates after self-refresh.
    var chatViewListenerChatID = "{{.Data.Chat.ID}}";
    var chatViewListenerRegistry =
        window.__flowraChatViewListeners || (window.__flowraChatViewListeners = {});
    if (
        chatViewListenerRegistry[chatViewListenerChatID] &&
        typeof chatViewListenerRegistry[chatViewListenerChatID].cleanup === "function"
    ) {
        chatViewListenerRegistry[chatViewListenerChatID].cleanup();
    }

    var chatViewListenerController =
        typeof AbortController !== "undefined" ? new AbortController() : null;
    var chatViewListenerCleanupFns = [];
    var chatViewListenerScope = {
        cleanup: function () {
            if (chatViewListenerController) {
                chatViewListenerController.abort();
            }
            for (var i = 0; i < chatViewListenerCleanupFns.length; i++) {
                chatViewListenerCleanupFns[i]();
            }
            if (chatViewListenerRegistry[chatViewListenerChatID] === chatViewListenerScope) {
                delete chatViewListenerRegistry[chatViewListenerChatID];
            }
        },
    };
    chatViewListenerRegistry[chatViewListenerChatID] = chatViewListenerScope;

    function addChatViewListener(target, eventType, handler) {
        if (chatViewListenerController) {
            target.addEventListener(eventType, handler, {
                signal: chatViewListenerController.signal,
            });
            return;
        }

        target.addEventListener(eventType, handler);
        chatViewListenerCleanupFns.push(function () {
            target.removeEventListener(eventType, handler);
        });
    }

    // Scroll to bottom on load
    addChatViewListener(document, "htmx:afterSwap", function (evt) {
        if (evt.detail.target.id === "messages-{{.Data.Chat.ID}}") {
            scrollToBottom("messages-{{.Data.Chat.ID}}");
        }
    });

    // Handle incoming WebSocket messages
    // Note: evt.detail is msg.data from the WS payload; field names may be PascalCase (Go-style)
    // from domain events (ChatID, aggregate_id) or snake_case from processed payloads.
    addChatViewListener(document.body, "chat.message.posted", function (evt) {
        var msg = evt.detail;
        var chatId = msg.ChatID || msg.chat_id;
        var messageId = msg.aggregate_id || msg.message_id;
        if (chatId === "{{.Data.Chat.ID}}" && messageId) {
            // Skip if already in DOM (e.g. re-delivered event)
            if (document.getElementById("message-" + messageId)) return;
            htmx.ajax("GET", "/partials/messages/" + messageId, {
                target: "#messages-{{.Data.Chat.ID}}",
                swap: "beforeend",
            }).then(function () {
                scrollToBottom("messages-{{.Data.Chat.ID}}");
            });
        }
    });

    // Handle message edited
    addChatViewListener(document.body, "chat.message.edited", function (evt) {
        var msg = evt.detail;
        var messageId = msg.aggregate_id || msg.message_id;
        var el = messageId ? document.getElementById("message-" + messageId) : null;
        if (el) {
            htmx.ajax("GET", "/partials/messages/" + messageId, {
                target: "#message-" + messageId,
                swap: "outerHTML",
            });
        }
    });

    // Handle message deleted
    addChatViewListener(document.body, "chat.message.deleted", function (evt) {
        var msg = evt.detail;
        var messageId = msg.aggregate_id || msg.message_id;
        var el = messageId ? document.getElementById("message-" + messageId) : null;
        if (el) {
            el.remove();
        }
    });

    // Handle typing indicator
    addChatViewListener(document.body, "chat.typing", function (evt) {
        var data = evt.detail;
        if (
            data.chat_id === "{{.Data.Chat.ID}}" &&
            data.user_id !== "{{.User.ID}}"
        ) {
            showTypingIndicator(data.username, "{{.Data.Chat.ID}}");
        }
    });

    // Handle chat property changes — re-fetch the chat view partial to update header/sidebar
    var chatUpdateEvents = [
        "chat.type_changed", "chat.status_changed", "chat.renamed",
        "chat.priority_set", "chat.severity_set", "chat.user_assigned",
        "chat.assignee_removed", "chat.due_date_set", "chat.due_date_removed",
        "chat.closed", "chat.reopened"
    ];
    chatUpdateEvents.forEach(function (eventType) {
        addChatViewListener(document.body, eventType, function (evt) {
            var data = evt.detail || {};
            var chatId = data.chat_id || data.aggregate_id || "";
            if (chatId === "{{.Data.Chat.ID}}") {
                htmx.ajax("GET", "/partials/chats/{{.Data.Chat.ID}}", {
                    target: "#chat-{{.Data.Chat.ID}}",
                    swap: "outerHTML"
                });
            }
        });
    });
</script>

<style>
    .chat-view {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0; /* Required for nested flex to respect parent constraints */
        overflow: hidden; /* Prevent overflow */
    }

    .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border-bottom: 1px solid var(--muted-border-color);
        background: var(--card-background-color);
        flex-shrink: 0; /* Prevent header from shrinking */
    }

    .chat-title {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .chat-title h2 {
        margin: 0;
        font-size: 1.25rem;
    }

    .status-badge {
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
    }

    .status-badge.status-todo {
        background: var(--secondary-focus);
        color: var(--secondary);
    }

    .status-badge.status-in_progress,
    .status-badge.status-in-progress {
        background: #e3f2fd;
        color: #1976d2;
    }

    .status-badge.status-review {
        background: #fff3e0;
        color: #f57c00;
    }

    .status-badge.status-done {
        background: #e8f5e9;
        color: #388e3c;
    }

    .chat-actions {
        display: flex;
        gap: 0.5rem;
    }

    .chat-actions button {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        margin-bottom: 0;
    }

    .messages-container {
        flex: 1;
        min-height: 0; /* Required for flex item to shrink and allow scrolling */
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        color: var(--muted-color);
        flex-shrink: 0; /* Prevent typing indicator from shrinking */
    }

    .typing-indicator.hidden {
        display: none;
    }

    .typing-dots {
        display: flex;
        gap: 2px;
    }

    .typing-dots span {
        width: 6px;
        height: 6px;
        background: var(--muted-color);
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) {
        animation-delay: -0.32s;
    }

    .typing-dots span:nth-child(2) {
        animation-delay: -0.16s;
    }

    @keyframes typing {
        0%,
        80%,
        100% {
            transform: scale(0.6);
            opacity: 0.5;
        }
        40% {
            transform: scale(1);
            opacity: 1;
        }
    }

    /* Message styles */
    .message {
        display: flex;
        gap: 0.75rem;
        padding: 0.5rem 0;
    }

    .message-avatar {
        flex-shrink: 0;
    }

    .message-avatar img,
    .avatar-placeholder {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
    }

    .avatar-placeholder {
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.875rem;
    }

    .message-content {
        flex-grow: 1;
        min-width: 0;
    }

    .message-header {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
    }

    .message-body {
        word-wrap: break-word;
    }

    .message-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
        margin-top: 0.5rem;
    }

    .tag {
        display: inline-block;
        padding: 0.125rem 0.5rem;
        background: var(--secondary-focus);
        color: var(--secondary);
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 500;
    }

    .tag.tag-task {
        background: #e3f2fd;
        color: #1976d2;
    }

    .tag.tag-bug {
        background: #ffebee;
        color: #c62828;
    }

    .tag.tag-epic {
        background: #f3e5f5;
        color: #7b1fa2;
    }

    .tag.tag-status {
        background: #e8f5e9;
        color: #388e3c;
    }

    .tag.tag-assignee {
        background: #fff3e0;
        color: #f57c00;
    }

    .tag.tag-priority {
        background: #fce4ec;
        color: #c2185b;
    }

    .tag.tag-due {
        background: #ede7f6;
        color: #512da8;
    }

    .tag.tag-title {
        background: #e0f7fa;
        color: #00838f;
    }

    .tag.tag-severity {
        background: #ffcdd2;
        color: #b71c1c;
    }

    .message-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }

    .message-actions button {
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
    }
</style>
{{end}}
