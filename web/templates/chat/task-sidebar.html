{{define "chat/task-sidebar"}}
{{if .Data.Task}}
<div class="task-details" id="task-details-{{.Data.Task.ID}}">
    <h3>Task Details</h3>

    <!-- Status -->
    <div class="field">
        <label for="task-status">Status</label>
        <select id="task-status"
                data-action-url="/api/v1/workspaces/{{.Data.Chat.WorkspaceID}}/chats/{{.Data.Chat.ID}}/actions/status"
                name="status">
            {{if .Data.Statuses}}
            {{range .Data.Statuses}}
            <option value="{{.Value}}" {{if eq .Value $.Data.Task.Status}}selected{{end}}>{{.Label}}</option>
            {{end}}
            {{else}}
            <option value="{{.Data.Task.Status}}" selected>{{.Data.Task.Status}}</option>
            {{end}}
        </select>
        <span id="status-loading" class="htmx-indicator">Saving...</span>
    </div>

    <!-- Assignee -->
    <div class="field">
        <label for="task-assignee">Assignee</label>
        <select id="task-assignee"
                data-action-url="/api/v1/workspaces/{{.Data.Chat.WorkspaceID}}/chats/{{.Data.Chat.ID}}/actions/assignee"
                name="assignee_id">
            <option value="">Unassigned</option>
            {{range .Data.Participants}}
            <option value="{{.UserID}}"
                    {{if eq .UserID $.Data.Task.AssigneeID}}selected{{end}}>
                {{.DisplayName}}
            </option>
            {{end}}
        </select>
        <span id="assignee-loading" class="htmx-indicator">Saving...</span>
    </div>

    <!-- Priority -->
    <div class="field">
        <label for="task-priority">Priority</label>
        <select id="task-priority"
                data-action-url="/api/v1/workspaces/{{.Data.Chat.WorkspaceID}}/chats/{{.Data.Chat.ID}}/actions/priority"
                name="priority">
            <option value="Low" {{if or (eq .Data.Task.Priority "low") (eq .Data.Task.Priority "Low")}}selected{{end}}>Low</option>
            <option value="Medium" {{if or (eq .Data.Task.Priority "medium") (eq .Data.Task.Priority "Medium")}}selected{{end}}>Medium</option>
            <option value="High" {{if or (eq .Data.Task.Priority "high") (eq .Data.Task.Priority "High")}}selected{{end}}>High</option>
            <option value="Critical" {{if or (eq .Data.Task.Priority "critical") (eq .Data.Task.Priority "Critical")}}selected{{end}}>Critical</option>
        </select>
        <span id="priority-loading" class="htmx-indicator">Saving...</span>
    </div>

    <!-- Due Date -->
    <div class="field">
        <label for="task-due-date">Due Date</label>
        <input type="date"
               id="task-due-date"
               data-action-url="/api/v1/workspaces/{{.Data.Chat.WorkspaceID}}/chats/{{.Data.Chat.ID}}/actions/due-date"
               name="due_date"
               value="{{if .Data.Task.DueDate}}{{.Data.Task.DueDate | formatDateInput}}{{end}}">
        <span id="duedate-loading" class="htmx-indicator">Saving...</span>
    </div>

    {{if eq .Data.Chat.Type "bug"}}
    <!-- Severity (Bug-specific) -->
    <div class="field">
        <label for="task-severity">Severity</label>
        <select id="task-severity"
                hx-put="/api/v1/workspaces/{{.Data.Chat.WorkspaceID}}/tasks/{{.Data.Task.ID}}/severity"
                hx-trigger="change"
                hx-swap="none"
                name="severity">
            <option value="Low" {{if or (eq .Data.Task.Severity "low") (eq .Data.Task.Severity "Low")}}selected{{end}}>Low</option>
            <option value="Medium" {{if or (eq .Data.Task.Severity "medium") (eq .Data.Task.Severity "Medium")}}selected{{end}}>Medium</option>
            <option value="High" {{if or (eq .Data.Task.Severity "high") (eq .Data.Task.Severity "High")}}selected{{end}}>High</option>
            <option value="Critical" {{if or (eq .Data.Task.Severity "critical") (eq .Data.Task.Severity "Critical")}}selected{{end}}>Critical</option>
        </select>
    </div>
    {{end}}

</div>
{{else}}
<div class="task-details"
     hx-get="/partials/chats/{{.Data.Chat.ID}}/task-details"
     hx-trigger="load"
     hx-swap="outerHTML">
    <p>Loading task details...</p>
</div>
{{end}}

<style>
.task-details h3 {
    margin-top: 0;
    margin-bottom: 1.5rem;
    font-size: 1.125rem;
    border-bottom: 1px solid var(--muted-border-color);
    padding-bottom: 0.75rem;
}

.task-details .field {
    margin-bottom: 1rem;
}

.task-details .field label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 0.25rem;
    color: var(--muted-color);
}

.task-details .field select,
.task-details .field input {
    margin-bottom: 0;
}

.task-details hr {
    margin: 1.5rem 0;
}

/* HTMX loading indicators */
.htmx-indicator {
    display: none;
    font-size: 0.75rem;
    color: var(--muted-color);
    margin-left: 0.5rem;
}

.htmx-request .htmx-indicator,
.htmx-request.htmx-indicator {
    display: inline;
}

.task-details .field {
    position: relative;
}
</style>

<script>
(function() {
    {{if .Data.Task}}
    var taskId = '{{.Data.Task.ID}}';
    var sidebarRegistry = window.__flowraTaskSidebarListeners || (window.__flowraTaskSidebarListeners = {});
    if (sidebarRegistry[taskId] && typeof sidebarRegistry[taskId].cleanup === 'function') {
        sidebarRegistry[taskId].cleanup();
    }

    var sidebarController = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var sidebarCleanupFns = [];
    var dueDateTimer = null;
    var inFlightByField = {};

    function addSidebarListener(target, eventType, handler) {
        if (sidebarController) {
            target.addEventListener(eventType, handler, { signal: sidebarController.signal });
            return;
        }
        target.addEventListener(eventType, handler);
        sidebarCleanupFns.push(function() {
            target.removeEventListener(eventType, handler);
        });
    }

    var sidebarScope = {
        cleanup: function() {
            if (dueDateTimer) {
                clearTimeout(dueDateTimer);
                dueDateTimer = null;
            }
            if (sidebarController) {
                sidebarController.abort();
            }
            for (var i = 0; i < sidebarCleanupFns.length; i++) {
                sidebarCleanupFns[i]();
            }
            if (sidebarRegistry[taskId] === sidebarScope) {
                delete sidebarRegistry[taskId];
            }
        }
    };
    sidebarRegistry[taskId] = sidebarScope;

    var statusClassMap = {
        'To Do': 'status-todo',
        'In Progress': 'status-in_progress',
        'In Review': 'status-review',
        'Done': 'status-done',
        'Backlog': 'status-backlog',
        'Cancelled': 'status-cancelled'
    };

    function setIndicatorVisible(indicatorId, visible) {
        var indicator = document.getElementById(indicatorId);
        if (!indicator) return;
        indicator.style.display = visible ? 'inline' : 'none';
    }

    function submitTaskField(inputEl, indicatorId) {
        if (!inputEl) return;
        var url = inputEl.getAttribute('data-action-url');
        var fieldName = inputEl.name;
        if (!url || !fieldName) return;

        var value = inputEl.value || '';
        var requestKey = fieldName + ':' + value;
        if (inFlightByField[fieldName] === requestKey) {
            return;
        }

        inFlightByField[fieldName] = requestKey;
        setIndicatorVisible(indicatorId, true);

        var body = encodeURIComponent(fieldName) + '=' + encodeURIComponent(value);
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
                'HX-Request': 'true'
            },
            credentials: 'same-origin',
            body: body
        })
            .then(function(resp) {
                if (!resp.ok) {
                    throw new Error('request failed');
                }
            })
            .catch(function() {
                if (typeof showToast === 'function') {
                    showToast('Failed to save changes. Please try again.', 'error');
                }
            })
            .finally(function() {
                if (inFlightByField[fieldName] === requestKey) {
                    delete inFlightByField[fieldName];
                }
                setIndicatorVisible(indicatorId, false);
            });
    }

    function updateHeaderStatus(statusValue) {
        var headerBadge = document.getElementById('chat-header-status');
        if (!headerBadge) return;
        headerBadge.textContent = statusValue;
        headerBadge.className = 'status-badge ' + (statusClassMap[statusValue] || ('status-' + statusValue.toLowerCase().replace(/ /g, '_')));
    }

    var statusSelect = document.getElementById('task-status');
    if (statusSelect) {
        addSidebarListener(statusSelect, 'change', function() {
            updateHeaderStatus(this.value);
            submitTaskField(statusSelect, 'status-loading');
        });
    }

    var assigneeSelect = document.getElementById('task-assignee');
    if (assigneeSelect) {
        addSidebarListener(assigneeSelect, 'change', function() {
            submitTaskField(assigneeSelect, 'assignee-loading');
        });
    }

    var prioritySelect = document.getElementById('task-priority');
    if (prioritySelect) {
        addSidebarListener(prioritySelect, 'change', function() {
            submitTaskField(prioritySelect, 'priority-loading');
        });
    }

    var dueDateInput = document.getElementById('task-due-date');
    if (dueDateInput) {
        addSidebarListener(dueDateInput, 'change', function() {
            if (dueDateTimer) {
                clearTimeout(dueDateTimer);
            }
            dueDateTimer = setTimeout(function() {
                submitTaskField(dueDateInput, 'duedate-loading');
                dueDateTimer = null;
            }, 500);
        });
    }

    addSidebarListener(document.body, 'task.updated', function(evt) {
        var data = evt.detail;

        if (data.task_id === taskId && data.changes) {
            var changes = data.changes;

            if (changes.status && changes.status.new) {
                if (statusSelect) {
                    statusSelect.value = changes.status.new;
                }
                updateHeaderStatus(changes.status.new);
            }

            if (changes.assignee !== undefined) {
                if (assigneeSelect) {
                    assigneeSelect.value = changes.assignee.new || '';
                }
            }

            if (changes.priority) {
                if (prioritySelect && changes.priority.new) {
                    prioritySelect.value = changes.priority.new.charAt(0).toUpperCase() + changes.priority.new.slice(1);
                }
            }

            if (changes.due_date !== undefined) {
                if (dueDateInput) {
                    dueDateInput.value = changes.due_date.new || '';
                }
            }
        }
    });
    {{end}}
})();
</script>
{{end}}
